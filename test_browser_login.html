<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Login</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 600px; margin: 50px auto; padding: 20px; }
        .form-group { margin: 15px 0; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px; }
        button { background: #007bff; color: white; padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background: #0056b3; }
        .result { margin: 20px 0; padding: 15px; border-radius: 4px; }
        .success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .test-users { background: #f8f9fa; padding: 15px; border-radius: 4px; margin: 20px 0; }
    </style>
</head>
<body>
    <h1>🔐 Test Login Page</h1>
    
    <div class="test-users">
        <h3>Available Test Users:</h3>
        <ul>
            <li><strong>Admin:</strong> admin / admin123</li>
            <li><strong>User:</strong> testuser / testpassword123</li>
            <li><strong>User:</strong> john_doe / johnpassword123</li>
        </ul>
    </div>
    
    <form onsubmit="testLogin(event)">
        <div class="form-group">
            <label for="username">Username:</label>
            <input type="text" id="username" value="admin" required>
        </div>
        
        <div class="form-group">
            <label for="password">Password:</label>
            <input type="password" id="password" value="admin123" required>
        </div>
        
        <button type="submit">Test Login</button>
    </form>
    
    <div id="result"></div>
    
    <div style="margin-top: 30px;">
        <h3>Quick Test Links:</h3>
        <button onclick="testUser('admin', 'admin123')">Test Admin</button>
        <button onclick="testUser('testuser', 'testpassword123')">Test Testuser</button>
        <button onclick="testUser('john_doe', 'johnpassword123')">Test John Doe</button>
    </div>

    <script>
        function showResult(message, isSuccess = true) {
            const result = document.getElementById('result');
            result.innerHTML = `<div class="result ${isSuccess ? 'success' : 'error'}">${message}</div>`;
        }

        async function testLogin(event) {
            event.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            showResult('Testing login...', true);
            
            try {
                console.log('Attempting login with:', { username, password });
                
                const response = await fetch('http://localhost:5000/api/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ username, password })
                });
                
                console.log('Response status:', response.status);
                console.log('Response headers:', response.headers);
                
                const data = await response.json();
                console.log('Response data:', data);
                
                if (response.ok) {
                    showResult(`
                        ✅ Login Successful!<br>
                        User: ${data.user.username}<br>
                        Role: ${data.user.role}<br>
                        Email: ${data.user.email}<br>
                        Token: ${data.access_token.substring(0, 50)}...
                    `, true);
                    
                    // Store token for potential dashboard use
                    localStorage.setItem('authToken', data.access_token);
                    
                } else {
                    showResult(`
                        ❌ Login Failed!<br>
                        Status: ${response.status}<br>
                        Error: ${data.error || 'Unknown error'}<br>
                        Full Response: ${JSON.stringify(data, null, 2)}
                    `, false);
                }
                
            } catch (error) {
                console.error('Login error:', error);
                showResult(`❌ Network Error: ${error.message}`, false);
            }
        }
        
        async function testUser(username, password) {
            document.getElementById('username').value = username;
            document.getElementById('password').value = password;
            await testLogin(new Event('submit'));
        }
        
        // Auto-test admin on page load
        window.onload = function() {
            setTimeout(() => testUser('admin', 'admin123'), 1000);
        };
    </script>
</body>
</html>
