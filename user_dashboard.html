<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Dashboard - Secure File System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
    </style>
</head>
<body class="min-h-screen">
    <!-- Navigation -->
    <nav class="bg-white shadow-lg">
        <div class="max-w-7xl mx-auto px-4">
            <div class="flex justify-between h-16">
                <div class="flex items-center">
                    <h1 class="text-xl font-bold text-gray-800">🔐 Secure File System</h1>
                    <span class="ml-4 text-sm text-gray-600">User Dashboard</span>
                </div>
                <div class="flex items-center space-x-4">
                    <span id="userInfo" class="text-sm text-gray-600"></span>
                    <button onclick="logout()" class="px-3 py-1 bg-red-600 text-white rounded-md hover:bg-red-700 text-sm">
                        Logout
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="max-w-7xl mx-auto py-6 px-4">
        <!-- User Stats -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="bg-white rounded-lg shadow p-6">
                <div class="flex items-center">
                    <div class="p-3 bg-blue-100 rounded-full">
                        <svg class="w-6 h-6 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
                        </svg>
                    </div>
                    <div class="ml-4">
                        <p class="text-sm text-gray-600">My Files</p>
                        <p id="myFilesCount" class="text-2xl font-bold text-gray-900">0</p>
                    </div>
                </div>
            </div>
            
            <div class="bg-white rounded-lg shadow p-6">
                <div class="flex items-center">
                    <div class="p-3 bg-green-100 rounded-full">
                        <svg class="w-6 h-6 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path>
                        </svg>
                    </div>
                    <div class="ml-4">
                        <p class="text-sm text-gray-600">Storage Used</p>
                        <p id="storageUsed" class="text-2xl font-bold text-gray-900">0 MB</p>
                    </div>
                </div>
            </div>
            
            <div class="bg-white rounded-lg shadow p-6">
                <div class="flex items-center">
                    <div class="p-3 bg-purple-100 rounded-full">
                        <svg class="w-6 h-6 text-purple-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                        </svg>
                    </div>
                    <div class="ml-4">
                        <p class="text-sm text-gray-600">Last Login</p>
                        <p id="lastLogin" class="text-lg font-bold text-gray-900">-</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Tabs -->
        <div class="bg-white rounded-lg shadow">
            <div class="border-b border-gray-200">
                <nav class="flex -mb-px">
                    <button onclick="showTab('files')" class="tab-button px-6 py-3 border-b-2 border-blue-500 font-medium text-blue-600" data-tab="files">
                        📁 My Files
                    </button>
                    <button onclick="showTab('upload')" class="tab-button px-6 py-3 border-b-2 border-transparent font-medium text-gray-500 hover:text-gray-700" data-tab="upload">
                        📤 Upload File
                    </button>
                    <button onclick="showTab('profile')" class="tab-button px-6 py-3 border-b-2 border-transparent font-medium text-gray-500 hover:text-gray-700" data-tab="profile">
                        👤 My Profile
                    </button>
                </nav>
            </div>

            <!-- Files Tab -->
            <div id="files-tab" class="tab-content active p-6">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="text-lg font-medium text-gray-900">My Files</h3>
                    <div class="flex space-x-2">
                        <input type="text" id="fileSearch" placeholder="Search files..." 
                               class="px-3 py-2 border border-gray-300 rounded-md text-sm"
                               onkeyup="searchFiles()">
                        <button onclick="loadFiles()" class="px-4 py-2 bg-blue-600 text-white rounded-md hover:bg-blue-700 text-sm">
                            Refresh
                        </button>
                    </div>
                </div>
                
                <div id="filesList" class="space-y-4">
                    <p class="text-gray-500">Loading your files...</p>
                </div>
            </div>

            <!-- Upload Tab -->
            <div id="upload-tab" class="tab-content p-6">
                <h3 class="text-lg font-medium text-gray-900 mb-4">Upload New File</h3>
                
                <div id="uploadArea" 
                     class="border-2 border-dashed border-gray-300 rounded-lg p-8 text-center cursor-pointer hover:border-gray-400"
                     ondrop="handleDrop(event)"
                     ondragover="handleDragOver(event)"
                     ondragleave="handleDragLeave(event)"
                     onclick="document.getElementById('fileInput').click()">
                    
                    <svg class="mx-auto h-12 w-12 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12" />
                    </svg>
                    <p class="mt-2 text-lg text-gray-600">Drop files here or click to browse</p>
                    <p class="text-sm text-gray-500">Maximum file size: 16MB</p>
                    <input type="file" id="fileInput" class="hidden" onchange="handleFileSelect(event)">
                </div>

                <div class="mt-6">
                    <label class="flex items-center">
                        <input type="checkbox" id="isPublic" class="rounded border-gray-300 text-blue-600">
                        <span class="ml-2 text-sm text-gray-700">Make this file public (accessible to all users)</span>
                    </label>
                </div>

                <div class="mt-6">
                    <button onclick="uploadFile()" 
                            class="w-full flex justify-center py-3 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-green-600 hover:bg-green-700">
                        🚀 Upload File
                    </button>
                </div>

                <div id="uploadMessage" class="mt-4 hidden"></div>
            </div>

            <!-- Profile Tab -->
            <div id="profile-tab" class="tab-content p-6">
                <h3 class="text-lg font-medium text-gray-900 mb-4">My Profile</h3>
                <div id="profileInfo" class="space-y-4">
                    <p class="text-gray-500">Loading profile information...</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        let authToken = localStorage.getItem('authToken');
        let selectedFile = null;
        let currentUser = null;

        // Check authentication
        if (!authToken) {
            window.location.href = 'http://localhost:8080/login.html';
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            loadUserProfile();
            loadUserStats();
            loadFiles();
        });

        function showTab(tabName) {
            // Hide all tabs
            document.querySelectorAll('.tab-content').forEach(tab => {
                tab.classList.remove('active');
            });
            
            // Remove active state from all buttons
            document.querySelectorAll('.tab-button').forEach(btn => {
                btn.classList.remove('border-blue-500', 'text-blue-600');
                btn.classList.add('border-transparent', 'text-gray-500');
            });
            
            // Show selected tab
            document.getElementById(tabName + '-tab').classList.add('active');
            
            // Add active state to clicked button
            const activeBtn = document.querySelector(`[data-tab="${tabName}"]`);
            activeBtn.classList.remove('border-transparent', 'text-gray-500');
            activeBtn.classList.add('border-blue-500', 'text-blue-600');
        }

        async function loadUserProfile() {
            try {
                const response = await fetch('http://localhost:5000/api/auth/profile', {
                    headers: { 'Authorization': `Bearer ${authToken}` }
                });

                if (response.ok) {
                    const data = await response.json();
                    currentUser = data.user;
                    document.getElementById('userInfo').textContent = `${data.user.username} (${data.user.role})`;
                    displayProfile(data.user);
                } else {
                    logout();
                }
            } catch (error) {
                console.error('Profile error:', error);
                logout();
            }
        }

        function displayProfile(user) {
            const profileInfo = document.getElementById('profileInfo');
            profileInfo.innerHTML = `
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700">Username</label>
                        <p class="mt-1 text-sm text-gray-900">${user.username}</p>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700">Email</label>
                        <p class="mt-1 text-sm text-gray-900">${user.email}</p>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700">Role</label>
                        <p class="mt-1 text-sm text-gray-900">${user.role}</p>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700">Account Status</label>
                        <p class="mt-1 text-sm text-gray-900">${user.is_active ? 'Active' : 'Inactive'}</p>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700">Member Since</label>
                        <p class="mt-1 text-sm text-gray-900">${new Date(user.created_at).toLocaleDateString()}</p>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700">Last Login</label>
                        <p class="mt-1 text-sm text-gray-900">${user.last_login ? new Date(user.last_login).toLocaleString() : 'Never'}</p>
                    </div>
                </div>
            `;
        }

        async function loadUserStats() {
            try {
                const response = await fetch('http://localhost:5000/api/files/list', {
                    headers: { 'Authorization': `Bearer ${authToken}` }
                });

                if (response.ok) {
                    const data = await response.json();
                    const files = data.files || [];
                    
                    // Update stats
                    document.getElementById('myFilesCount').textContent = files.length;
                    
                    const totalSize = files.reduce((sum, file) => sum + file.file_size, 0);
                    const sizeInMB = (totalSize / (1024 * 1024)).toFixed(2);
                    document.getElementById('storageUsed').textContent = `${sizeInMB} MB`;
                    
                    if (currentUser && currentUser.last_login) {
                        document.getElementById('lastLogin').textContent = new Date(currentUser.last_login).toLocaleDateString();
                    }
                }
            } catch (error) {
                console.error('Stats error:', error);
            }
        }

        async function loadFiles() {
            try {
                const response = await fetch('http://localhost:5000/api/files/list', {
                    headers: { 'Authorization': `Bearer ${authToken}` }
                });

                if (response.ok) {
                    const data = await response.json();
                    displayFiles(data.files || []);
                } else {
                    document.getElementById('filesList').innerHTML = '<p class="text-red-600">Error loading files</p>';
                }
            } catch (error) {
                document.getElementById('filesList').innerHTML = '<p class="text-red-600">Network error</p>';
            }
        }

        function displayFiles(files) {
            const filesList = document.getElementById('filesList');
            
            if (files.length === 0) {
                filesList.innerHTML = '<p class="text-gray-500">No files uploaded yet.</p>';
                return;
            }

            filesList.innerHTML = files.map(file => `
                <div class="border rounded-lg p-4 hover:bg-gray-50">
                    <div class="flex items-center justify-between">
                        <div class="flex-1">
                            <h4 class="font-medium text-gray-900">${file.original_filename}</h4>
                            <p class="text-sm text-gray-500">
                                ${formatFileSize(file.file_size)} | 
                                ${new Date(file.created_at).toLocaleDateString()} |
                                ${file.is_public ? '🌐 Public' : '🔒 Private'}
                            </p>
                        </div>
                        <div class="flex space-x-2">
                            <button onclick="downloadFile('${file.id}')" 
                                    class="px-3 py-1 bg-blue-600 text-white rounded hover:bg-blue-700 text-sm">
                                Download
                            </button>
                            <button onclick="deleteFile('${file.id}')" 
                                    class="px-3 py-1 bg-red-600 text-white rounded hover:bg-red-700 text-sm">
                                Delete
                            </button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function searchFiles() {
            const searchTerm = document.getElementById('fileSearch').value.toLowerCase();
            const fileItems = document.querySelectorAll('#filesList > div');
            
            fileItems.forEach(item => {
                const fileName = item.querySelector('h4').textContent.toLowerCase();
                if (fileName.includes(searchTerm)) {
                    item.style.display = 'block';
                } else {
                    item.style.display = 'none';
                }
            });
        }

        // File upload functions (same as before)
        function handleDragOver(event) {
            event.preventDefault();
            document.getElementById('uploadArea').classList.add('border-blue-500', 'bg-blue-50');
        }

        function handleDragLeave(event) {
            event.preventDefault();
            document.getElementById('uploadArea').classList.remove('border-blue-500', 'bg-blue-50');
        }

        function handleDrop(event) {
            event.preventDefault();
            document.getElementById('uploadArea').classList.remove('border-blue-500', 'bg-blue-50');
            
            const files = event.dataTransfer.files;
            if (files.length > 0) {
                selectedFile = files[0];
                updateFileDisplay();
            }
        }

        function handleFileSelect(event) {
            const files = event.target.files;
            if (files.length > 0) {
                selectedFile = files[0];
                updateFileDisplay();
            }
        }

        function updateFileDisplay() {
            if (selectedFile) {
                document.getElementById('uploadArea').innerHTML = `
                    <svg class="mx-auto h-12 w-12 text-green-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
                    </svg>
                    <p class="mt-2 text-lg font-medium text-gray-800">${selectedFile.name}</p>
                    <p class="text-sm text-gray-500">${formatFileSize(selectedFile.size)}</p>
                    <button onclick="document.getElementById('fileInput').click()" class="mt-2 text-blue-600 hover:text-blue-800">
                        Choose different file
                    </button>
                `;
            }
        }

        async function uploadFile() {
            if (!selectedFile) {
                showMessage('uploadMessage', '❌ Please select a file first', false);
                return;
            }

            const formData = new FormData();
            formData.append('file', selectedFile);
            formData.append('is_public', document.getElementById('isPublic').checked);

            try {
                showMessage('uploadMessage', '📤 Uploading file...', true);

                const response = await fetch('http://localhost:5000/api/files/upload', {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${authToken}` },
                    body: formData
                });

                const data = await response.json();

                if (response.ok) {
                    showMessage('uploadMessage', `✅ File uploaded successfully!`, true);
                    selectedFile = null;
                    document.getElementById('fileInput').value = '';
                    document.getElementById('isPublic').checked = false;
                    updateFileDisplay();
                    loadFiles();
                    loadUserStats();
                } else {
                    showMessage('uploadMessage', `❌ Upload failed: ${data.error}`, false);
                }
            } catch (error) {
                showMessage('uploadMessage', `❌ Upload error: ${error.message}`, false);
            }
        }

        async function downloadFile(fileId) {
            try {
                const response = await fetch(`http://localhost:5000/api/files/${fileId}`, {
                    headers: { 'Authorization': `Bearer ${authToken}` }
                });

                if (response.ok) {
                    const blob = await response.blob();
                    const url = window.URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = 'downloaded_file';
                    document.body.appendChild(a);
                    a.click();
                    window.URL.revokeObjectURL(url);
                    document.body.removeChild(a);
                } else {
                    alert('Download failed');
                }
            } catch (error) {
                alert('Download error: ' + error.message);
            }
        }

        async function deleteFile(fileId) {
            if (!confirm('Are you sure you want to delete this file?')) return;

            try {
                const response = await fetch(`http://localhost:5000/api/files/${fileId}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${authToken}` }
                });

                if (response.ok) {
                    loadFiles();
                    loadUserStats();
                    alert('File deleted successfully');
                } else {
                    alert('Delete failed');
                }
            } catch (error) {
                alert('Delete error: ' + error.message);
            }
        }

        function showMessage(elementId, message, isSuccess = true) {
            const element = document.getElementById(elementId);
            element.innerHTML = `<div class="p-4 rounded-md ${isSuccess ? 'bg-green-50 text-green-800' : 'bg-red-50 text-red-800'}">${message}</div>`;
            element.classList.remove('hidden');
        }

        function formatFileSize(bytes) {
            if (bytes === 0) return '0 Bytes';
            const k = 1024;
            const sizes = ['Bytes', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }

        function logout() {
            localStorage.removeItem('authToken');
            window.location.href = 'http://localhost:8080/login.html';
        }
    </script>
</body>
</html>
