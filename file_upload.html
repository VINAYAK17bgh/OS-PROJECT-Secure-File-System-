<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>File Upload - Secure File System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .upload-area { border: 2px dashed #cbd5e0; transition: all 0.3s; }
        .upload-area:hover { border-color: #4a5568; background-color: #f7fafc; }
        .upload-area.dragover { border-color: #4299e1; background-color: #ebf8ff; }
    </style>
</head>
<body class="min-h-screen py-12 px-4">
    <div class="max-w-4xl mx-auto">
        <div class="text-center mb-8">
            <h1 class="text-4xl font-bold text-white mb-4">📁 Secure File Upload</h1>
            <p class="text-xl text-gray-200">Upload and manage your encrypted files</p>
        </div>

        <!-- Login Section -->
        <div id="loginSection" class="bg-white rounded-lg shadow-xl p-8 mb-8">
            <h2 class="text-2xl font-bold mb-6 text-gray-800">🔐 Login Required</h2>
            <form onsubmit="login(event)" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700">Username</label>
                    <input type="text" id="username" required 
                           class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500"
                           placeholder="Enter your username" value="testuser">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Password</label>
                    <input type="password" id="password" required 
                           class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500"
                           placeholder="Enter your password" value="testpassword123">
                </div>
                <button type="submit" 
                        class="w-full flex justify-center py-2 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500">
                    Login
                </button>
            </form>
            <div id="loginMessage" class="mt-4 hidden"></div>
        </div>

        <!-- Upload Section -->
        <div id="uploadSection" class="hidden">
            <!-- User Info -->
            <div class="bg-white rounded-lg shadow-xl p-6 mb-8">
                <div class="flex items-center justify-between">
                    <div>
                        <h2 class="text-xl font-semibold text-gray-800">Welcome, <span id="userDisplay"></span>!</h2>
                        <p class="text-gray-600">Role: <span id="roleDisplay"></span></p>
                    </div>
                    <button onclick="logout()" 
                            class="px-4 py-2 bg-red-600 text-white rounded-md hover:bg-red-700">
                        Logout
                    </button>
                </div>
            </div>

            <!-- File Upload Form -->
            <div class="bg-white rounded-lg shadow-xl p-8 mb-8">
                <h2 class="text-2xl font-bold mb-6 text-gray-800">📤 Upload New File</h2>
                
                <div id="uploadArea" 
                     class="upload-area rounded-lg p-8 text-center cursor-pointer"
                     ondrop="handleDrop(event)"
                     ondragover="handleDragOver(event)"
                     ondragleave="handleDragLeave(event)"
                     onclick="document.getElementById('fileInput').click()">
                    
                    <svg class="mx-auto h-12 w-12 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12" />
                    </svg>
                    <p class="mt-2 text-lg text-gray-600">Drop files here or click to browse</p>
                    <p class="text-sm text-gray-500">Maximum file size: 16MB</p>
                    <input type="file" id="fileInput" class="hidden" onchange="handleFileSelect(event)">
                </div>

                <div class="mt-6">
                    <label class="flex items-center">
                        <input type="checkbox" id="isPublic" class="rounded border-gray-300 text-indigo-600 shadow-sm focus:border-indigo-300 focus:ring focus:ring-indigo-200 focus:ring-opacity-50">
                        <span class="ml-2 text-sm text-gray-700">Make this file public (accessible to all users)</span>
                    </label>
                </div>

                <div class="mt-6">
                    <button onclick="uploadFile()" 
                            class="w-full flex justify-center py-3 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-green-600 hover:bg-green-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-green-500">
                        🚀 Upload File
                    </button>
                </div>

                <div id="uploadMessage" class="mt-4 hidden"></div>
                <div id="uploadProgress" class="mt-4 hidden">
                    <div class="w-full bg-gray-200 rounded-full h-2.5">
                        <div id="progressBar" class="bg-blue-600 h-2.5 rounded-full transition-all duration-300" style="width: 0%"></div>
                    </div>
                </div>
            </div>

            <!-- Files List -->
            <div class="bg-white rounded-lg shadow-xl p-8">
                <h2 class="text-2xl font-bold mb-6 text-gray-800">📋 Your Files</h2>
                <button onclick="loadFiles()" 
                        class="mb-4 px-4 py-2 bg-blue-600 text-white rounded-md hover:bg-blue-700">
                    Refresh Files
                </button>
                <div id="filesList" class="space-y-4">
                    <p class="text-gray-500">Loading your files...</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        let authToken = null;
        let selectedFile = null;

        function showMessage(elementId, message, isSuccess = true) {
            const element = document.getElementById(elementId);
            element.innerHTML = `
                <div class="p-4 rounded-md ${isSuccess ? 'bg-green-50 text-green-800' : 'bg-red-50 text-red-800'}">
                    ${message}
                </div>
            `;
            element.classList.remove('hidden');
        }

        async function login(event) {
            event.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            try {
                const response = await fetch('http://localhost:5000/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (response.ok) {
                    authToken = data.access_token;
                    localStorage.setItem('authToken', authToken);
                    
                    document.getElementById('userDisplay').textContent = data.user.username;
                    document.getElementById('roleDisplay').textContent = data.user.role;
                    
                    document.getElementById('loginSection').classList.add('hidden');
                    document.getElementById('uploadSection').classList.remove('hidden');
                    
                    loadFiles();
                    showMessage('loginMessage', '✅ Login successful!', true);
                } else {
                    showMessage('loginMessage', `❌ ${data.error}`, false);
                }
            } catch (error) {
                showMessage('loginMessage', `❌ Network error: ${error.message}`, false);
            }
        }

        function logout() {
            authToken = null;
            localStorage.removeItem('authToken');
            document.getElementById('loginSection').classList.remove('hidden');
            document.getElementById('uploadSection').classList.add('hidden');
        }

        function handleDragOver(event) {
            event.preventDefault();
            document.getElementById('uploadArea').classList.add('dragover');
        }

        function handleDragLeave(event) {
            event.preventDefault();
            document.getElementById('uploadArea').classList.remove('dragover');
        }

        function handleDrop(event) {
            event.preventDefault();
            document.getElementById('uploadArea').classList.remove('dragover');
            
            const files = event.dataTransfer.files;
            if (files.length > 0) {
                selectedFile = files[0];
                updateFileDisplay();
            }
        }

        function handleFileSelect(event) {
            const files = event.target.files;
            if (files.length > 0) {
                selectedFile = files[0];
                updateFileDisplay();
            }
        }

        function updateFileDisplay() {
            if (selectedFile) {
                document.getElementById('uploadArea').innerHTML = `
                    <svg class="mx-auto h-12 w-12 text-green-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
                    </svg>
                    <p class="mt-2 text-lg font-medium text-gray-800">${selectedFile.name}</p>
                    <p class="text-sm text-gray-500">${formatFileSize(selectedFile.size)}</p>
                    <button onclick="document.getElementById('fileInput').click()" class="mt-2 text-blue-600 hover:text-blue-800">
                        Choose different file
                    </button>
                `;
            }
        }

        async function uploadFile() {
            if (!selectedFile) {
                showMessage('uploadMessage', '❌ Please select a file first', false);
                return;
            }

            if (!authToken) {
                showMessage('uploadMessage', '❌ Please login first', false);
                return;
            }

            const formData = new FormData();
            formData.append('file', selectedFile);
            formData.append('is_public', document.getElementById('isPublic').checked);

            try {
                document.getElementById('uploadProgress').classList.remove('hidden');
                showMessage('uploadMessage', '📤 Uploading file...', true);

                const response = await fetch('http://localhost:5000/api/files/upload', {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${authToken}` },
                    body: formData
                });

                const data = await response.json();

                if (response.ok) {
                    showMessage('uploadMessage', `✅ File uploaded successfully! File ID: ${data.file.id}`, true);
                    selectedFile = null;
                    document.getElementById('fileInput').value = '';
                    document.getElementById('isPublic').checked = false;
                    updateFileDisplay();
                    loadFiles();
                } else {
                    showMessage('uploadMessage', `❌ Upload failed: ${data.error}`, false);
                }
            } catch (error) {
                showMessage('uploadMessage', `❌ Upload error: ${error.message}`, false);
            } finally {
                document.getElementById('uploadProgress').classList.add('hidden');
            }
        }

        async function loadFiles() {
            if (!authToken) return;

            try {
                const response = await fetch('http://localhost:5000/api/files/list', {
                    headers: { 'Authorization': `Bearer ${authToken}` }
                });

                const data = await response.json();

                if (response.ok) {
                    displayFiles(data.files);
                } else {
                    document.getElementById('filesList').innerHTML = `<p class="text-red-600">Error loading files: ${data.error}</p>`;
                }
            } catch (error) {
                document.getElementById('filesList').innerHTML = `<p class="text-red-600">Network error: ${error.message}</p>`;
            }
        }

        function displayFiles(files) {
            const filesList = document.getElementById('filesList');
            
            if (files.length === 0) {
                filesList.innerHTML = '<p class="text-gray-500">No files uploaded yet.</p>';
                return;
            }

            filesList.innerHTML = files.map(file => `
                <div class="border rounded-lg p-4 hover:bg-gray-50">
                    <div class="flex items-center justify-between">
                        <div class="flex-1">
                            <h3 class="font-medium text-gray-900">${file.original_filename}</h3>
                            <p class="text-sm text-gray-500">
                                Size: ${formatFileSize(file.file_size)} | 
                                Uploaded: ${formatDate(file.created_at)} |
                                ${file.is_public ? '🌐 Public' : '🔒 Private'}
                            </p>
                        </div>
                        <div class="flex space-x-2">
                            <button onclick="downloadFile('${file.id}')" 
                                    class="px-3 py-1 bg-blue-600 text-white rounded hover:bg-blue-700">
                                Download
                            </button>
                            <button onclick="deleteFile('${file.id}')" 
                                    class="px-3 py-1 bg-red-600 text-white rounded hover:bg-red-700">
                                Delete
                            </button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        async function downloadFile(fileId) {
            if (!authToken) return;

            try {
                const response = await fetch(`http://localhost:5000/api/files/${fileId}`, {
                    headers: { 'Authorization': `Bearer ${authToken}` }
                });

                if (response.ok) {
                    const blob = await response.blob();
                    const url = window.URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = 'downloaded_file';
                    document.body.appendChild(a);
                    a.click();
                    window.URL.revokeObjectURL(url);
                    document.body.removeChild(a);
                } else {
                    alert('Download failed');
                }
            } catch (error) {
                alert('Download error: ' + error.message);
            }
        }

        async function deleteFile(fileId) {
            if (!authToken) return;
            if (!confirm('Are you sure you want to delete this file?')) return;

            try {
                const response = await fetch(`http://localhost:5000/api/files/${fileId}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${authToken}` }
                });

                if (response.ok) {
                    loadFiles();
                    alert('File deleted successfully');
                } else {
                    alert('Delete failed');
                }
            } catch (error) {
                alert('Delete error: ' + error.message);
            }
        }

        function formatFileSize(bytes) {
            if (bytes === 0) return '0 Bytes';
            const k = 1024;
            const sizes = ['Bytes', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }

        function formatDate(dateString) {
            return new Date(dateString).toLocaleString();
        }

        // Check for existing token on page load
        window.onload = function() {
            const token = localStorage.getItem('authToken');
            if (token) {
                authToken = token;
                // Verify token is still valid
                fetch('http://localhost:5000/api/auth/profile', {
                    headers: { 'Authorization': `Bearer ${token}` }
                }).then(response => {
                    if (response.ok) {
                        return response.json();
                    } else {
                        throw new Error('Invalid token');
                    }
                }).then(data => {
                    document.getElementById('userDisplay').textContent = data.user.username;
                    document.getElementById('roleDisplay').textContent = data.user.role;
                    document.getElementById('loginSection').classList.add('hidden');
                    document.getElementById('uploadSection').classList.remove('hidden');
                    loadFiles();
                }).catch(() => {
                    localStorage.removeItem('authToken');
                });
            }
        };
    </script>
</body>
</html>
